<!-- popup/popup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PriceScout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #0a0a0a;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .header svg {
      color: #2563eb;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .search-container {
      margin-bottom: 16px;
    }
    
    .search-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #2563eb;
    }
    
    .search-button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    
    .search-button:hover {
      background: #1d4ed8;
    }
    
    .search-button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    
    .results-container {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .result-card {
      padding: 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .result-platform {
      font-size: 12px;
      color: #6b7280;
      text-transform: capitalize;
      margin-bottom: 4px;
    }
    
    .result-title {
      font-size: 13px;
      color: #0a0a0a;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    
    .result-price {
      font-size: 16px;
      font-weight: 600;
      color: #2563eb;
      margin-bottom: 8px;
    }
    
    .result-link {
      display: inline-block;
      color: #2563eb;
      text-decoration: none;
      font-size: 13px;
    }
    
    .result-link:hover {
      text-decoration: underline;
    }
    
    .empty-state {
      text-align: center;
      color: #6b7280;
      padding: 32px;
      font-size: 14px;
    }
    
    .loading {
      text-align: center;
      padding: 32px;
      color: #6b7280;
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
    }
    
    .supporter-btn {
      background: #f9fafb;
      border: 1px solid #e5e5e5;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #374151;
    }
    
    .supporter-btn:hover {
      background: #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    <h1>PriceScout</h1>
  </div>
  
  <div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="Search for game items, gold, accounts...">
    <button id="search-button" class="search-button">Search Prices</button>
  </div>
  
  <div id="results-container" class="results-container">
    <div class="empty-state">
      Enter a search term to compare prices across gaming marketplaces
    </div>
  </div>
  
  <div class="footer">
    <button id="supporter-btn" class="supporter-btn">❤️ Become a Supporter</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
